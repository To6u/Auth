name: Portfolio Project Config
version: 1.0.0
schema: v1

systemMessage: |
  Проект: Персональное портфолио на React + TypeScript + Vite
  
  Стек:
  - React 19 + TypeScript 5.9
  - Vite 7
  - React Router 7
  - Framer Motion (анимации)
  - Lucide React (иконки)
  - Чистый CSS (без модулей, без препроцессоров)
  
  Структура проекта:
  - src/components/ - UI компоненты (feature-based)
  - src/pages/ - страницы с page-scoped компонентами
  - src/hooks/ - кастомные хуки
  - src/types/ - TypeScript типы
  - src/services/ - API сервисы
  - src/constants/ - константы
  
  Важные правила:
  
  ИМПОРТЫ:
  - Всегда используй алиасы @/ вместо относительных путей
  - Порядок: React/библиотеки → @/ модули → компоненты → типы → локальные → стили
  
  Пример импортов:
  import { useState } from 'react';
  import { motion } from 'framer-motion';
  import { useAuthForm } from '@/hooks/useAuthForm';
  import { TabSelector } from '@/components/tabs';
  import type { AuthMode } from '@/types/auth.types';
  import { AboutTab } from './components';
  import './Component.css';
  
  ИМЕНОВАНИЕ:
  - Компоненты: PascalCase (AuthForm.tsx, SubmitButton.tsx)
  - Хуки: useСamelCase (useAuthForm.ts)
  - Типы: kebab-case.types.ts (auth.types.ts)
  - CSS: kebab-case.css (auth-form.css)
  - Константы: kebab-case.constants.ts, значения UPPER_SNAKE_CASE
  - CSS классы: BEM-подобные (.auth-form__title, .button--primary)
  
  СТРУКТУРА КОМПОНЕНТОВ:
  
  Feature-based (глобальные):
  components/feature-name/
    ├── components/         # внутренние компоненты
    ├── FeatureName.tsx    # главный компонент
    ├── feature-name.css
    └── index.ts           # публичный API
  
  Page-scoped (компоненты страницы):
  pages/page-name/
    ├── components/feature/
    │   ├── components/    # плоская структура подкомпонентов
    │   ├── Feature.tsx
    │   └── feature.css
    ├── PageName.tsx
    └── page-name.css
  
  TYPESCRIPT:
  - Избегай any, используй unknown + type guards
  - Интерфейсы для объектов, type для unions
  - Всегда типизируй props, функции, API ответы
  
  CSS:
  - Чистый CSS, без модулей
  - BEM-подобное именование
  - Никаких inline стилей (кроме динамических значений)
  
  FRAMER MOTION:
  - Используй motion компоненты
  - LayoutGroup для layout анимаций
  - AnimatePresence для mount/unmount
  
  ОПТИМИЗАЦИЯ:
  - useMemo: тяжёлые вычисления, объекты в зависимостях
  - useCallback: коллбэки для мемоизированных компонентов
  - React.memo: часто рендерящиеся компоненты
  - НЕ оптимизируй примитивы и простые операции
  
  АНТИ-ПАТТЕРНЫ (избегать):
  - any типы
  - Inline стили без причины
  - Index как key (только для статичных списков)
  - Бизнес-логика в компонентах (выносить в хуки)
  - Мутации state
  - console.log в коде

slashCommands:
  - name: component
    description: Создать React компонент для проекта
    prompt: |
      Создай React функциональный компонент для портфолио проекта.
      
      Требования:
      - TypeScript с типизацией всех props
      - Импорты через алиасы @/
      - Правильный порядок импортов
      - JSDoc комментарии
      - Export через index.ts
      - Отдельный CSS файл (kebab-case)
      - BEM-подобные CSS классы
      
      Если это feature-based компонент - создай структуру с components/, index.ts
      Если page-scoped - укажи в какой странице (pages/*/components/)
      
      Компонент: {{{ input }}}

  - name: hook
    description: Создать кастомный хук
    prompt: |
      Создай кастомный React хук для портфолио проекта.
      
      Требования:
      - TypeScript типизация
      - Префикс use (useHookName)
      - Возвращать объект с именованными значениями
      - JSDoc комментарии
      - Файл: camelCase.ts
      
      Хук: {{{ input }}}

  - name: page
    description: Создать новую страницу
    prompt: |
      Создай страницу для портфолио проекта.
      
      Структура:
      pages/page-name/
        ├── components/       # page-scoped компоненты
        ├── PageName.tsx
        └── page-name.css
      
      Добавь:
      - Импорты через @/
      - TypeScript типы
      - CSS файл
      - Экспорт страницы
      
      Страница: {{{ input }}}

  - name: motion
    description: Добавить Framer Motion анимацию
    prompt: |
      Добавь анимацию с Framer Motion для портфолио проекта.
      
      Используй:
      - motion компоненты
      - LayoutGroup если layout анимация
      - AnimatePresence для появления/исчезновения
      - variants для сложных анимаций
      
      Анимация: {{{ input }}}

  - name: types
    description: Создать TypeScript типы
    prompt: |
      Создай TypeScript типы для портфолио проекта.
      
      Требования:
      - Файл: kebab-case.types.ts
      - interface для объектов
      - type для unions/примитивов
      - Избегай any
      - JSDoc комментарии
      - Экспорт через export
      
      Типы для: {{{ input }}}

  - name: feature
    description: Создать feature-based компонент
    prompt: |
      Создай feature-based компонент со структурой:
      
      components/feature-name/
        ├── components/           # внутренние компоненты
        │   ├── SubComponent/
        │   │   ├── SubComponent.tsx
        │   │   └── sub-component.css
        │   └── index.ts
        ├── FeatureName.tsx       # главный компонент
        ├── feature-name.css
        └── index.ts              # публичный экспорт
      
      Требования:
      - TypeScript
      - Импорты через @/
      - CSS с BEM классами
      - index.ts реэкспорт
      
      Фича: {{{ input }}}

  - name: optimize
    description: Оптимизировать компонент
    prompt: |
      Оптимизируй React компонент следуя правилам проекта:
      
      - useMemo для тяжёлых вычислений и объектов в deps
      - useCallback для коллбэков в мемоизированных компонентах
      - React.memo для часто рендерящихся компонентов
      - НЕ оптимизируй без причины
      
      Объясни какие оптимизации применил и почему.
      
      {{{ input }}}

  - name: api
    description: Создать API сервис
    prompt: |
      Создай API сервис для портфолио проекта.
      
      Требования:
      - TypeScript с generic типами
      - Файл в services/
      - Использовать fetch
      - Обработка ошибок
      - Типизация ответов
      - Proxy на /api (настроен в Vite)
      
      Endpoint: {{{ input }}}

contextProviders:
  - name: folder
    params:
      folders:
        - src/components
        - src/pages
        - src/hooks
        - src/types
        - src/services
        - src/constants
        - src/utils

  - name: code
    params:
      useSearch: true

tabAutocompleteOptions:
  debounceDelay: 400
  maxPromptTokens: 1024
  ```

---

## Как использовать команды:

### Создать компонент:
  ```
  /component кнопка с иконкой и loading состоянием для формы
  ```
  
  ### Создать фичу:
  ```
  /feature навигационное меню с анимацией и активным состоянием
  ```
  
  ### Создать хук:
  ```
  /hook useScrollAnimation для параллакс эффекта
  ```
  
  ### Добавить анимацию:
  ```
  /motion slide-fade переход между табами с direction
  ```
  
  ### Создать типы:
  ```
  /types
  interface Project {
id: string;
title: string;
description: string;
technologies: string[];
imageUrl: string;
demoUrl?: string;
githubUrl?: string;
}
  ```
  
  ### Создать страницу:
  ```
  /page проекты с фильтрацией по технологиям
  ```
  
  ### Оптимизировать:
  ```
  /optimize
  [вставь код компонента]
  ```
  
  ### API сервис:
  ```
  /api получение списка проектов с пагинацией